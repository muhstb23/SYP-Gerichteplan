<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firma</title>
    <link rel="stylesheet" href="/js/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid">
        <h1>Laden aller Spieler am einfachsten Beispiel gezeigt</h1>

        <button class="btn btn-outline-dark btn-md" id="btnLoadSpieler">Lade die Spieler</button>
        <div id="output">Anzeige der Ergebnisse</div>

        <div class="card border-black text-primary w-75">
            <div class="card-header border-primary">Messages</div>
            <div id="messages" class="card-body">
                <p class="card-text">Infos für den User</p>
            </div>
        </div>

        <button id="btnChangeSpieler" class="btn btn-md btn-outline-dark mt-3" >Spieler ändern</button>

        <form id="spielerForm" class="w-75 d-none">

            <div class="mb-3 mt-3">
                <label for="firstName" class="form-label">Firstname:</label>
                <input type="text" class="form-control" id="firstName" placeholder="Enter firstName">
            </div>

            <div class="mb-3 mt-3">
                <label for="lastName" class="form-label">Lastname:</label>
                <input type="text" class="form-control" id="lastName" placeholder="Enter lastName">
            </div>

            <div class="mb-3 mt-3">
                <label for="club" class="form-label">Clubname:</label>
                <input type="text" class="form-control" id="club" placeholder="Enter club">
            </div>

            <div class="mb-3 mt-3">
                <label for="age" class="form-label">Age:</label>
                <input type="number" class="form-control" id="age" placeholder="Enter age">
            </div>

            <div class="mb-3 mt-3">
                <label for="country" class="form-label">Country:</label>
                <input type="text" class="form-control" id="country" placeholder="Enter country">
            </div>

            <button class="btn btn-md btn-outline-dark" id="btnPost" type="submit">Speichern - Post</button>
            <button class="btn btn-md btn-outline-dark" id="btnPut" type="submit">Put</button>
        </form>

    </div>

    <script type="module" src="/js/firma.js"></script>
</body>
</html>
